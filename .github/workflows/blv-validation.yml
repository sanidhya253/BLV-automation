name: BLV Security Pipeline v2.0

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  AUTO_REVERT_ENABLED: "true"

jobs:
  sast-scan:
    name: "SAST — Semgrep Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run BLV Semgrep SAST Scan
        env:
          CI_RESULT_API: https://blv-automation-production.up.railway.app/api/ci-results
        run: python blv_semgrep_runner.py ./vulnerable_app
        continue-on-error: true
      - name: Upload SAST Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-report.json

  dast-scan:
    name: "DAST — BLV Dynamic Validator"
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install BLV validator dependencies
        run: pip install requests
      - name: Build vulnerable app Docker image
        run: docker build -t vulnerable-app ./vulnerable_app
      - name: Run vulnerable app container
        run: |
          docker rm -f vuln_app || true
          docker run -d -p 5000:5000 --name vuln_app vulnerable-app
      - name: Wait for vulnerable app to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/health > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 1
          done
          docker logs vuln_app || true
          exit 1
      - name: Run BLV DAST Validator
        env:
          CI_RESULT_API: https://blv-automation-production.up.railway.app/api/ci-results
        run: python blv_rule_validator.py http://127.0.0.1:5000
      - name: Show container logs
        if: always()
        run: docker logs vuln_app || true

  revert-on-failure:
    name: "Auto-Revert Failed Commit"
    runs-on: ubuntu-latest
    needs: dast-scan
    if: failure() && github.event_name == 'push'
    steps:
      - name: Check if auto-revert is enabled
        run: |
          if [ "${{ env.AUTO_REVERT_ENABLED }}" != "true" ]; then
            echo "Auto-revert DISABLED"
            exit 0
          fi
      - name: Checkout repository
        if: env.AUTO_REVERT_ENABLED == 'true'
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        if: env.AUTO_REVERT_ENABLED == 'true'
        run: |
          git config user.name "BLV Security Bot"
          git config user.email "blv-bot@security.local"
      - name: Revert the failed commit
        if: env.AUTO_REVERT_ENABLED == 'true'
        run: |
          echo "============================================"
          echo "  BLV SECURITY GATE - AUTO REVERT"
          echo "============================================"
          echo "  Commit: ${{ github.sha }}"
          echo "  Reverting to maintain secure codebase..."
          git revert --no-edit HEAD
          git push origin main
          echo "  REVERTED successfully"
          echo "============================================"
